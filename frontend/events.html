<!DOCTYPE html>
<html>

<head>
<title>Events</title>
<link rel="stylesheet" href="/static/CSS/styles.css">
</head>

<body>

<div class="container">

<h1>All Events</h1>

{{if .events}}

    {{range .events}}
        <div class="form-box" style="margin-bottom:20px; text-align:left;">
            <h3>{{.Name}}</h3>
            <p><b>Description:</b> {{.Description}}</p>
            <p><b>Location:</b> {{.Location}}</p>
            <p><b>Date:</b> {{.DateTime.Format "02 Jan 2006 15:04"}}</p>
        </div>
    {{end}}

{{else}}
    <p>No events available.</p>
{{end}}

<br>
<a href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
