<!DOCTYPE html>
<html>

<head>
<title>Events</title>
<!--<link rel="stylesheet" href="/static/CSS/styles.css"> -->

<style>
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
}

.card h3 {
    margin-top: 10px;
}

.meta {
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="container">

<h1>All Events</h1>

{{if .events}}

<div class="grid">

{{range .events}}
<div class="card">

    <!-- 🔥 IMAGE -->
    <img src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678?w=400" alt="event image">

    <h3>{{.Name}}</h3>

    <p>{{.Description}}</p>

    <p><b>📍 Location:</b> {{.Location}}</p>
    <p><b>🕒 Date:</b> {{.DateTime.Format "02 Jan 2006 15:04"}}</p>

    <!-- 🔥 IMPORTANT FOR INTERVIEW -->
    <p class="meta">
        Event ID: {{.ID}} <br>
        Created by User ID: {{.UserID}}
    </p>

</div>
{{end}}

</div>

{{else}}
<p>No events available.</p>
{{end}}

<br>
<a href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
