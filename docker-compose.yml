services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: go-api
    depends_on:
      - postgres
    environment:
      - ENV=docker
    ports:
      - "8080:8080"

volumes:
  postgres_data: